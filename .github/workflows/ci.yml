name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - 'cli/**'
              - 'migrations/**'
              - 'wrangler.toml'
              - '.github/workflows/ci.yml'
            android:
              - 'android/**'
            ios:
              - 'iOS/**'

  rust:
    name: Rust (worker + CLI)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Cache worker-build binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-${{ runner.os }}-v1
      - name: Install worker-build (if missing)
        run: command -v worker-build >/dev/null || cargo install worker-build --locked
      - name: Check workspace
        run: cargo check --workspace --all-targets
      - name: Build worker (wasm)
        run: worker-build --release --no-opt
      - name: Build CLI + smoke test
        working-directory: ./cli
        run: |
          cargo build --release
          cargo run --release -- --help

  android:
    name: Android
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile debug sources
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew compileDebugSources

  ios:
    name: iOS (syntax)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - name: Resolve packages
        working-directory: ./iOS/Pixie
        run: xcodebuild -resolvePackageDependencies -project Pixie.xcodeproj -scheme Pixie
      - name: Swift parse check (all files, no SDK required)
        working-directory: ./iOS/Pixie
        run: |
          find . -name "*.swift" -not -path "./build/*" -not -path "*/.build/*" -print0 \
            | xargs -0 -P4 -I{} xcrun swiftc -parse -target arm64-apple-ios16.6 "{}" 2>&1 \
            | grep -v "warning:" || true
