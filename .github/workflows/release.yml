name: Release (App Store)

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion for this upload (e.g. 202606111200)"
        required: true

jobs:
  upload:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Guard against beta macOS build host (ITMS-90111)
        run: |
          BUILD=$(sw_vers -buildVersion)
          echo "Runner macOS build: $BUILD"
          if [[ "$BUILD" =~ [A-Z]5[0-9]+[a-z]$ ]]; then
            echo "::error::Runner is on a beta macOS build ($BUILD); App Store uploads from beta hosts are rejected post-submission."
            exit 1
          fi

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AICREDITS_DEPLOY_KEY }}

      - name: Trust github.com host key
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Import signing identity and profiles
        env:
          SIGNING_P12_BASE64: ${{ secrets.SIGNING_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "$SIGNING_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/pixie-appstore.mobileprovision
          echo "$WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/pixie-widget-appstore.mobileprovision

      - name: Archive
        run: |
          xcodebuild archive \
            -project iOS/Pixie/Pixie.xcodeproj \
            -scheme Pixie \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Pixie.xcarchive" \
            -scmProvider system \
            CURRENT_PROJECT_VERSION=${{ inputs.build_number }} \
            | tail -40

      - name: Package IPA
        run: |
          cd "$RUNNER_TEMP"
          mkdir -p Payload
          cp -R Pixie.xcarchive/Products/Applications/Pixie.app Payload/
          zip -qry Pixie.ipa Payload
          /usr/libexec/PlistBuddy -c "Print BuildMachineOSBuild" Payload/Pixie.app/Info.plist

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_DSS2FFU68G.p8
          xcrun altool --upload-app -f "$RUNNER_TEMP/Pixie.ipa" -t ios \
            --apiKey DSS2FFU68G \
            --apiIssuer a5ebdab5-0ceb-463c-8151-195b902f117b
